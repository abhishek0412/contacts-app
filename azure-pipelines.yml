# ╔══════════════════════════════════════════════════════════╗
# ║  Contacts App — Pipeline Router                         ║
# ║                                                          ║
# ║  Pipelines have been restructured into:                  ║
# ║    pipelines/ci.yml  — CI pipeline (scan, test, build)   ║
# ║    pipelines/cd.yml  — CD pipeline (deploy to Azure)     ║
# ║                                                          ║
# ║  In Azure DevOps, create two pipelines:                  ║
# ║    1. "contacts-app-ci"  → pointing to pipelines/ci.yml  ║
# ║    2. "contacts-app-cd"  → pointing to pipelines/cd.yml  ║
# ║                                                          ║
# ║  This file is kept for backward compatibility.           ║
# ║  It mirrors the CI pipeline.                             ║
# ╚══════════════════════════════════════════════════════════╝

trigger: none
pr: none

parameters:
  - name: imageVersion
    displayName: "Image Version Tag (e.g. 1.0.0)"
    type: string
    default: "1.0.0"

pool:
  vmImage: "ubuntu-latest"

variables:
  nodeVersion: "22.x"
  imageVersion: "${{ parameters.imageVersion }}"
  imageTag: "$(imageVersion)-$(Build.BuildId)"

stages:
  - stage: Scan
    displayName: "Scan"
    jobs:
      - template: pipelines/templates/scan.yml

  - stage: Test
    displayName: "Test"
    dependsOn: Scan
    condition: always()
    jobs:
      - template: pipelines/templates/test.yml
        parameters:
          nodeVersion: $(nodeVersion)

  - stage: E2E
    displayName: "E2E"
    dependsOn: Test
    condition: always()
    jobs:
      - template: pipelines/templates/test-e2e.yml
        parameters:
          nodeVersion: $(nodeVersion)

  - stage: Build
    displayName: "Build"
    dependsOn: E2E
    condition: not(canceled())
    jobs:
      - template: pipelines/templates/build-docker.yml
        parameters:
          imageTag: $(imageTag)
          imageVersion: $(imageVersion)
