# CI Pipeline — Contacts App
# Manual trigger only (no auto-trigger on push or PR)

trigger: none
pr: none

parameters:
  - name: imageVersion
    displayName: "Image Version Tag (e.g. 1.0.0)"
    type: string
    default: "1.0.0"

pool:
  vmImage: "ubuntu-latest"

variables:
  nodeVersion: "22.x"
  imageVersion: "${{ parameters.imageVersion }}"
  imageTag: "$(imageVersion)-$(Build.BuildId)"

stages:
  # ──────────────────────────────────────────────
  # Stage 0: Secret Scanning
  # ──────────────────────────────────────────────
  - stage: Secret_Scan
    displayName: "Secret Scan"
    jobs:
      - job: Gitleaks
        displayName: "Gitleaks Secret Detection"
        steps:
          - script: |
              GITLEAKS_VERSION="8.24.3"
              curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
                | tar -xz -C /usr/local/bin gitleaks
            displayName: "Install Gitleaks"

          - script: |
              gitleaks detect --source=. --verbose --report-format=sarif --report-path=$(System.DefaultWorkingDirectory)/gitleaks-report.sarif
            displayName: "Run Gitleaks scan"

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: "$(System.DefaultWorkingDirectory)/gitleaks-report.sarif"
              ArtifactName: "security-reports"
              publishLocation: "Container"
            condition: succeededOrFailed()
            displayName: "Publish Gitleaks report"

  # ──────────────────────────────────────────────
  # Stage 1: API Integration Tests
  # ──────────────────────────────────────────────
  - stage: Test_API
    displayName: "API Tests"
    dependsOn:
      - Secret_Scan
    jobs:
      - job: ServerTests
        displayName: "Server Integration Tests"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "$(nodeVersion)"
            displayName: "Install Node.js"

          - script: |
              cd server-api
              npm ci
              npm install --no-save jest-junit
            displayName: "Install dependencies"

          - script: |
              cd server-api
              npm audit --audit-level=high
            displayName: "Audit API dependencies"
            continueOnError: true

          - script: |
              cd server-api
              npx jest --verbose --ci --reporters=default --reporters=jest-junit
            displayName: "Run API tests"
            env:
              JEST_JUNIT_OUTPUT_DIR: "$(System.DefaultWorkingDirectory)/server-api/test-results"
              JEST_JUNIT_OUTPUT_NAME: "api-results.xml"

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "server-api/test-results/*.xml"
              testRunTitle: "API Integration Tests"
            condition: succeededOrFailed()
            displayName: "Publish API test results"

  # ──────────────────────────────────────────────
  # Stage 2: Frontend Unit Tests (parallel with API)
  # ──────────────────────────────────────────────
  - stage: Test_Frontend
    displayName: "Frontend Tests"
    dependsOn:
      - Secret_Scan
    jobs:
      - job: FrontendTests
        displayName: "Frontend Unit Tests"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "$(nodeVersion)"
            displayName: "Install Node.js"

          - script: |
              cd frontend
              npm ci
              npm install --no-save jest-junit
            displayName: "Install dependencies"

          - script: |
              cd frontend
              npm audit --audit-level=high
            displayName: "Audit frontend dependencies"
            continueOnError: true

          - script: |
              cd frontend
              npx react-scripts test --ci --watchAll=false --reporters=default --reporters=jest-junit
            displayName: "Run frontend tests"
            env:
              JEST_JUNIT_OUTPUT_DIR: "$(System.DefaultWorkingDirectory)/frontend/test-results"
              JEST_JUNIT_OUTPUT_NAME: "frontend-results.xml"
              CI: "true"

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "frontend/test-results/*.xml"
              testRunTitle: "Frontend Unit Tests"
            condition: succeededOrFailed()
            displayName: "Publish frontend test results"

  # ──────────────────────────────────────────────
  # Stage 3: E2E Tests (after unit/integration tests)
  # ──────────────────────────────────────────────
  # Stage 3: E2E Tests (after unit/integration tests)
  # Non-blocking — flaky UI tests will not fail the pipeline
  # ──────────────────────────────────────────────
  - stage: Test_E2E
    displayName: "E2E Tests (non-blocking)"
    dependsOn:
      - Test_API
      - Test_Frontend
    jobs:
      - job: PlaywrightTests
        displayName: "Playwright E2E Tests"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "$(nodeVersion)"
            displayName: "Install Node.js"

          - script: |
              cd server-api
              npm ci
            displayName: "Install API dependencies"

          - script: |
              cd frontend
              npm ci
            displayName: "Install frontend dependencies"

          - script: |
              npm ci
              npx playwright install --with-deps chromium
            displayName: "Install Playwright & Chromium"

          - script: |
              npx playwright test --reporter=list,junit
            displayName: "Run E2E tests"
            continueOnError: true
            env:
              CI: "true"
              PLAYWRIGHT_JUNIT_OUTPUT_NAME: "$(System.DefaultWorkingDirectory)/e2e-results/e2e-results.xml"

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "e2e-results/*.xml"
              testRunTitle: "E2E Tests"
            condition: succeededOrFailed()
            displayName: "Publish E2E test results"

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: "$(System.DefaultWorkingDirectory)/test-results"
              ArtifactName: "playwright-screenshots"
              publishLocation: "Container"
            condition: failed()
            displayName: "Publish failure screenshots"

  # ──────────────────────────────────────────────
  # Stage 4: Build Docker Images (after all tests)
  # Runs even if E2E stage fails (flaky UI tests)
  # ──────────────────────────────────────────────
  - stage: Build_Docker
    displayName: "Build Docker Images"
    dependsOn:
      - Test_E2E
    condition: |
      and(
        not(failed('Test_API')),
        not(failed('Test_Frontend')),
        not(canceled())
      )
    jobs:
      - job: BuildImages
        displayName: "Build & Export Docker Images"
        steps:
          - script: |
              HADOLINT_VERSION="2.12.0"
              curl -sSfL "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64" \
                -o /usr/local/bin/hadolint
              chmod +x /usr/local/bin/hadolint
            displayName: "Install Hadolint"

          - script: |
              echo "--- Linting server-api/Dockerfile ---"
              hadolint server-api/Dockerfile
              echo "--- Linting frontend/Dockerfile ---"
              hadolint frontend/Dockerfile
            displayName: "Lint Dockerfiles (Hadolint)"

          - script: |
              docker build \
                -t contacts-app-api:$(imageTag) \
                -t contacts-app-api:$(imageVersion) \
                -t contacts-app-api:latest \
                -f server-api/Dockerfile \
                server-api/
            displayName: "Build API image"

          - script: |
              docker build \
                -t contacts-app-frontend:$(imageTag) \
                -t contacts-app-frontend:$(imageVersion) \
                -t contacts-app-frontend:latest \
                -f frontend/Dockerfile \
                frontend/
            displayName: "Build Frontend image"

          - script: |
              mkdir -p $(Build.ArtifactStagingDirectory)/docker

              docker save \
                contacts-app-api:$(imageTag) \
                contacts-app-api:$(imageVersion) \
                contacts-app-api:latest \
                -o $(Build.ArtifactStagingDirectory)/docker/contacts-app-api-$(imageTag).tar

              docker save \
                contacts-app-frontend:$(imageTag) \
                contacts-app-frontend:$(imageVersion) \
                contacts-app-frontend:latest \
                -o $(Build.ArtifactStagingDirectory)/docker/contacts-app-frontend-$(imageTag).tar

              cp docker-compose.yml $(Build.ArtifactStagingDirectory)/docker/
            displayName: "Export images as tar files"

          - script: |
              TRIVY_VERSION="0.69.3"
              curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
                | tar -xz -C /usr/local/bin trivy
            displayName: "Install Trivy"

          - script: |
              echo "--- Scanning API image ---"
              trivy image --severity HIGH,CRITICAL --exit-code 0 --format table contacts-app-api:$(imageTag)
              trivy image --severity HIGH,CRITICAL --format json --output $(Build.ArtifactStagingDirectory)/docker/trivy-api-report.json contacts-app-api:$(imageTag)

              echo "--- Scanning Frontend image ---"
              trivy image --severity HIGH,CRITICAL --exit-code 0 --format table contacts-app-frontend:$(imageTag)
              trivy image --severity HIGH,CRITICAL --format json --output $(Build.ArtifactStagingDirectory)/docker/trivy-frontend-report.json contacts-app-frontend:$(imageTag)
            displayName: "Scan Docker images (Trivy)"

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)/docker"
              ArtifactName: "docker-images"
              publishLocation: "Container"
            displayName: "Publish Docker artifacts"
