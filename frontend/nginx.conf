# Rate limiting: 10 req/sec per IP for API calls (burst allows short spikes)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Proxy cache: store API GET responses
proxy_cache_path /var/cache/nginx/api_cache levels=1:2 keys_zone=api_cache:10m max_size=50m inactive=60s;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseinstallations.googleapis.com https://www.googleapis.com https://*.googleapis.com https://*.firebaseio.com https://api.github.com https://github.com https://www.google-analytics.com; font-src 'self' data: https://fonts.gstatic.com; frame-src 'self' https://accounts.google.com https://github.com https://*.firebaseapp.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API calls to backend
    location /api/ {
        # Rate limiting — reject excess requests with 429
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        # Cache GET responses for 60s (keyed per user via Authorization header)
        proxy_cache api_cache;
        proxy_cache_valid 200 60s;
        proxy_cache_key "$request_uri|$http_authorization";
        proxy_cache_methods GET;
        add_header X-Cache-Status $upstream_cache_status always;

        proxy_pass ${API_PROXY_PASS};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
