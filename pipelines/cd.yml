# ╔══════════════════════════════════════════════════════════╗
# ║  CD Pipeline — Contacts App                             ║
# ║  Deploys to Azure Container Apps (Dev only)             ║
# ║  Consumes Docker tar artifacts from CI pipeline         ║
# ╚══════════════════════════════════════════════════════════╝

trigger: none
pr: none

# ── Reference the CI pipeline as a resource ──────────────
resources:
  pipelines:
    - pipeline: ci
      source: "contacts-app-ci" # Name of CI pipeline in Azure DevOps
      trigger: none # No auto-trigger — manual only

parameters:
  - name: imageVersion
    displayName: "Image Version (must match CI build)"
    type: string
    default: "1.0.0"

pool:
  vmImage: "ubuntu-latest"

variables:
  azureSubscription: "contacts-app" # Azure DevOps service connection name
  acrName: "contactsappacr" # Azure Container Registry name
  imageVersion: "${{ parameters.imageVersion }}"
  imageTag: "$(imageVersion)-$(resources.pipeline.ci.runID)"
  resourceGroupDev: "rg-contacts-dev"

stages:
  # ── Stage 1: Bootstrap Infrastructure ───────────────────
  # Creates resource group and ACR if they don't exist
  - stage: Bootstrap_Infra
    displayName: "Bootstrap Infrastructure"
    jobs:
      - job: CreateResources
        displayName: "Create RG & ACR"
        steps:
          - task: AzureCLI@2
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                set -e

                RG="$(resourceGroupDev)"
                REGION="eastus2"
                ACR="$(acrName)"

                echo "=== Ensuring Resource Group: $RG ==="
                az group create --name "$RG" --location "$REGION" --output none
                echo "Resource group ready."

                echo "=== Ensuring ACR: $ACR ==="
                if az acr show --name "$ACR" --resource-group "$RG" &>/dev/null; then
                  echo "ACR already exists."
                else
                  az acr create \
                    --name "$ACR" \
                    --resource-group "$RG" \
                    --location "$REGION" \
                    --sku Standard \
                    --admin-enabled false \
                    --output none
                  echo "ACR created."
                fi
            displayName: "Create Resource Group & ACR"

  # ── Stage 2: Push images to ACR ────────────────────────
  - stage: Push_to_ACR
    displayName: "Push to ACR"
    dependsOn:
      - Bootstrap_Infra
    jobs:
      - template: templates/push-to-acr.yml
        parameters:
          acrName: $(acrName)
          azureSubscription: $(azureSubscription)
          imageTag: $(imageTag)
          imageVersion: $(imageVersion)

  # ── Stage 2: Deploy to Dev ─────────────────────────────
  - stage: Deploy_Dev
    displayName: "Deploy to Dev"
    dependsOn:
      - Push_to_ACR
    jobs:
      - template: templates/deploy-region.yml
        parameters:
          environment: "Dev"
          azureSubscription: $(azureSubscription)
          resourceGroup: $(resourceGroupDev)
          region: "eastus2"
          acrName: $(acrName)
          imageTag: $(imageTag)
          envSuffix: "dev"
