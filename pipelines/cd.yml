# ╔══════════════════════════════════════════════════════════╗
# ║  CD Pipeline — Contacts App                             ║
# ║  Deploys to Azure Container Apps (multi-region)         ║
# ║  Consumes Docker tar artifacts from CI pipeline         ║
# ╚══════════════════════════════════════════════════════════╝

trigger: none
pr: none

# ── Reference the CI pipeline as a resource ──────────────
resources:
  pipelines:
    - pipeline: ci
      source: "contacts-app-ci" # Name of CI pipeline in Azure DevOps
      trigger: none # No auto-trigger — manual only

parameters:
  - name: imageVersion
    displayName: "Image Version (must match CI build)"
    type: string
    default: "1.0.0"

  - name: deployDev
    displayName: "Deploy to Dev"
    type: boolean
    default: true

  - name: deployStaging
    displayName: "Deploy to Staging"
    type: boolean
    default: true

  - name: deployProd
    displayName: "Deploy to Production"
    type: boolean
    default: false

pool:
  vmImage: "ubuntu-latest"

variables:
  azureSubscription: "azure-service-connection" # Azure DevOps service connection name
  acrName: "contactsappacr" # Azure Container Registry name
  imageVersion: "${{ parameters.imageVersion }}"
  imageTag: "$(imageVersion)-$(resources.pipeline.ci.runID)"
  resourceGroupDev: "rg-contacts-dev"
  resourceGroupStaging: "rg-contacts-staging"
  resourceGroupProdEast: "rg-contacts-prod-eastus"
  resourceGroupProdWest: "rg-contacts-prod-westeurope"

stages:
  # ── Stage 1: Push images to ACR ────────────────────────
  - stage: Push_to_ACR
    displayName: "Push to ACR"
    jobs:
      - template: templates/push-to-acr.yml
        parameters:
          acrName: $(acrName)
          azureSubscription: $(azureSubscription)
          imageTag: $(imageTag)
          imageVersion: $(imageVersion)

  # ── Stage 2: Deploy to Dev (auto — no approval) ───────
  - stage: Deploy_Dev
    displayName: "Deploy to Dev"
    dependsOn:
      - Push_to_ACR
    condition: and(succeeded(), eq('${{ parameters.deployDev }}', 'true'))
    jobs:
      - template: templates/deploy-region.yml
        parameters:
          environment: "Dev"
          azureSubscription: $(azureSubscription)
          resourceGroup: $(resourceGroupDev)
          region: "eastus"
          acrName: $(acrName)
          imageTag: $(imageTag)
          envSuffix: "dev"

  # ── Stage 3: Deploy to Staging (approval required) ─────
  - stage: Deploy_Staging
    displayName: "Deploy to Staging"
    dependsOn:
      - Deploy_Dev
    condition: and(succeeded(), eq('${{ parameters.deployStaging }}', 'true'))
    jobs:
      - template: templates/deploy-region.yml
        parameters:
          environment: "Staging"
          azureSubscription: $(azureSubscription)
          resourceGroup: $(resourceGroupStaging)
          region: "eastus"
          acrName: $(acrName)
          imageTag: $(imageTag)
          envSuffix: "staging"

  # ── Stage 4: Deploy to Prod — East US (canary 20%) ────
  - stage: Deploy_Prod_EastUS
    displayName: "Deploy to Prod (East US)"
    dependsOn:
      - Deploy_Staging
    condition: and(succeeded(), eq('${{ parameters.deployProd }}', 'true'))
    jobs:
      - template: templates/deploy-region.yml
        parameters:
          environment: "Prod-EastUS"
          azureSubscription: $(azureSubscription)
          resourceGroup: $(resourceGroupProdEast)
          region: "eastus"
          acrName: $(acrName)
          imageTag: $(imageTag)
          envSuffix: "prod-eastus"
          canaryPercentage: 20

  # ── Stage 5: Promote East US to 100% ──────────────────
  - stage: Promote_Prod_EastUS
    displayName: "Promote East US (100%)"
    dependsOn:
      - Deploy_Prod_EastUS
    condition: succeeded()
    jobs:
      - deployment: Promote
        displayName: "Promote East US to full traffic"
        environment: "Prod-EastUS"
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  inputs:
                    azureSubscription: $(azureSubscription)
                    scriptType: "bash"
                    scriptLocation: "inlineScript"
                    inlineScript: |
                      echo "=== Promoting East US frontend to 100% ==="
                      az containerapp ingress traffic set \
                        --name "contacts-frontend-prod-eastus" \
                        --resource-group "$(resourceGroupProdEast)" \
                        --revision-weight latest=100

                      echo "=== Promoting East US API to 100% ==="
                      az containerapp ingress traffic set \
                        --name "contacts-api-prod-eastus" \
                        --resource-group "$(resourceGroupProdEast)" \
                        --revision-weight latest=100
                  displayName: "Set 100% traffic to latest revision"

  # ── Stage 6: Deploy to Prod — West Europe (canary 20%) ─
  - stage: Deploy_Prod_WestEurope
    displayName: "Deploy to Prod (West Europe)"
    dependsOn:
      - Promote_Prod_EastUS
    condition: succeeded()
    jobs:
      - template: templates/deploy-region.yml
        parameters:
          environment: "Prod-WestEurope"
          azureSubscription: $(azureSubscription)
          resourceGroup: $(resourceGroupProdWest)
          region: "westeurope"
          acrName: $(acrName)
          imageTag: $(imageTag)
          envSuffix: "prod-westeurope"
          canaryPercentage: 20

  # ── Stage 7: Promote West Europe to 100% ──────────────
  - stage: Promote_Prod_WestEurope
    displayName: "Promote West Europe (100%)"
    dependsOn:
      - Deploy_Prod_WestEurope
    condition: succeeded()
    jobs:
      - deployment: Promote
        displayName: "Promote West Europe to full traffic"
        environment: "Prod-WestEurope"
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  inputs:
                    azureSubscription: $(azureSubscription)
                    scriptType: "bash"
                    scriptLocation: "inlineScript"
                    inlineScript: |
                      echo "=== Promoting West Europe frontend to 100% ==="
                      az containerapp ingress traffic set \
                        --name "contacts-frontend-prod-westeurope" \
                        --resource-group "$(resourceGroupProdWest)" \
                        --revision-weight latest=100

                      echo "=== Promoting West Europe API to 100% ==="
                      az containerapp ingress traffic set \
                        --name "contacts-api-prod-westeurope" \
                        --resource-group "$(resourceGroupProdWest)" \
                        --revision-weight latest=100
                  displayName: "Set 100% traffic to latest revision"
