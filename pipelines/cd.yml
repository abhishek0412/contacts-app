# ╔══════════════════════════════════════════════════════════╗
# ║  CD Pipeline — Contacts App                             ║
# ║  Push → Deploy                                          ║
# ╚══════════════════════════════════════════════════════════╝

trigger: none
pr: none

# ── Reference the CI pipeline as a resource ──────────────
resources:
  pipelines:
    - pipeline: ci
      source: "contacts-app-ci"
      trigger: none

parameters:
  - name: imageVersion
    displayName: "Image Version (must match CI build)"
    type: string
    default: "1.0.0"

pool:
  vmImage: "ubuntu-latest"

variables:
  azureSubscription: "contacts-app"
  acrName: "contactsappacr"
  imageVersion: "${{ parameters.imageVersion }}"
  imageTag: "$(imageVersion)-$(resources.pipeline.ci.runID)"

stages:
  # ── Stage 1: Provision ACR & Push Images ───────────────
  - stage: Push
    displayName: "Push"
    jobs:
      - template: templates/push-to-acr.yml
        parameters:
          acrName: $(acrName)
          azureSubscription: $(azureSubscription)
          imageTag: $(imageTag)
          imageVersion: $(imageVersion)

  # ── Stage 2: Deploy to Dev ─────────────────────────────
  - stage: Deploy
    displayName: "Deploy"
    dependsOn: Push
    jobs:
      - template: templates/deploy-region.yml
        parameters:
          environment: "Dev"
          azureSubscription: $(azureSubscription)
          region: "eastus2"
          acrName: $(acrName)
          imageTag: $(imageTag)
          envSuffix: "dev"
