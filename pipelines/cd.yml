# ╔══════════════════════════════════════════════════════════╗
# ║  CD Pipeline — Contacts App                             ║
# ║  Deploys to Azure Container Apps (Dev only)             ║
# ║  Consumes Docker tar artifacts from CI pipeline         ║
# ╚══════════════════════════════════════════════════════════╝

trigger: none
pr: none

# ── Reference the CI pipeline as a resource ──────────────
resources:
  pipelines:
    - pipeline: ci
      source: "contacts-app-ci" # Name of CI pipeline in Azure DevOps
      trigger: none # No auto-trigger — manual only

parameters:
  - name: imageVersion
    displayName: "Image Version (must match CI build)"
    type: string
    default: "1.0.0"

pool:
  vmImage: "ubuntu-latest"

variables:
  azureSubscription: "contacts-app" # Azure DevOps service connection name
  acrName: "contactsappacr" # Azure Container Registry name
  imageVersion: "${{ parameters.imageVersion }}"
  imageTag: "$(imageVersion)-$(resources.pipeline.ci.runID)"

stages:
  # ── Stage 1: Bootstrap Infrastructure (Bicep) ──────────
  # Creates Resource Group + ACR so images can be pushed
  - stage: Bootstrap_Infra
    displayName: "Bootstrap Infrastructure (Bicep)"
    jobs:
      - job: BootstrapBicep
        displayName: "Create RG & ACR via Bicep"
        steps:
          - task: AzureResourceManagerTemplateDeployment@3
            inputs:
              connectedServiceName: $(azureSubscription)
              deploymentScope: "Subscription"
              location: "eastus2"
              templateLocation: "Linked artifact"
              csmFile: "pipelines/infra/bootstrap.bicep"
              overrideParameters: "-location eastus2 -acrName $(acrName) -environmentSuffix dev"
              deploymentMode: "Incremental"
              deploymentName: "bootstrap-infra-$(Build.BuildId)"
            displayName: "Deploy bootstrap Bicep (RG + ACR)"

  # ── Stage 2: Push images to ACR ────────────────────────
  - stage: Push_to_ACR
    displayName: "Push to ACR"
    dependsOn:
      - Bootstrap_Infra
    jobs:
      - template: templates/push-to-acr.yml
        parameters:
          acrName: $(acrName)
          azureSubscription: $(azureSubscription)
          imageTag: $(imageTag)
          imageVersion: $(imageVersion)

  # ── Stage 2: Deploy to Dev ─────────────────────────────
  - stage: Deploy_Dev
    displayName: "Deploy to Dev"
    dependsOn:
      - Push_to_ACR
    jobs:
      - template: templates/deploy-region.yml
        parameters:
          environment: "Dev"
          azureSubscription: $(azureSubscription)
          region: "eastus2"
          acrName: $(acrName)
          imageTag: $(imageTag)
          envSuffix: "dev"
