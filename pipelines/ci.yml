# ╔══════════════════════════════════════════════════════════╗
# ║  CI Pipeline — Contacts App                             ║
# ║  Manual trigger only. Produces Docker tar artifacts.    ║
# ╚══════════════════════════════════════════════════════════╝

trigger: none
pr: none

parameters:
  - name: imageVersion
    displayName: "Image Version Tag (e.g. 1.0.0)"
    type: string
    default: "1.0.0"

pool:
  vmImage: "ubuntu-latest"

variables:
  nodeVersion: "22.x"
  imageVersion: "${{ parameters.imageVersion }}"
  imageTag: "$(imageVersion)-$(Build.BuildId)"

stages:
  # ── Stage 0a: Secret Scanning ──────────────────────────
  - stage: Secret_Scan
    displayName: "Secret Scan"
    jobs:
      - template: templates/security-scan.yml

  # ── Stage 0b: Bicep IaC Scan (parallel with secrets) ───
  - stage: Scan_Bicep
    displayName: "Bicep IaC Scan"
    jobs:
      - template: templates/scan-bicep.yml

  # ── Stage 1: API Tests (after scans) ───────────────────
  - stage: Test_API
    displayName: "API Tests"
    dependsOn:
      - Secret_Scan
      - Scan_Bicep
    jobs:
      - template: templates/test-api.yml
        parameters:
          nodeVersion: $(nodeVersion)

  # ── Stage 2: Frontend Tests (parallel with API) ────────
  - stage: Test_Frontend
    displayName: "Frontend Tests"
    dependsOn:
      - Secret_Scan
      - Scan_Bicep
    jobs:
      - template: templates/test-frontend.yml
        parameters:
          nodeVersion: $(nodeVersion)

  # ── Stage 3: E2E Tests (non-blocking) ──────────────────
  - stage: Test_E2E
    displayName: "E2E Tests (non-blocking)"
    dependsOn:
      - Test_API
      - Test_Frontend
    jobs:
      - template: templates/test-e2e.yml
        parameters:
          nodeVersion: $(nodeVersion)

  # ── Stage 4: Build Docker Images ───────────────────────
  # Runs even if E2E fails (flaky UI tests)
  - stage: Build_Docker
    displayName: "Build Docker Images"
    dependsOn:
      - Test_E2E
    condition: |
      and(
        not(failed('Test_API')),
        not(failed('Test_Frontend')),
        not(canceled())
      )
    jobs:
      - template: templates/build-docker.yml
        parameters:
          imageTag: $(imageTag)
          imageVersion: $(imageVersion)
