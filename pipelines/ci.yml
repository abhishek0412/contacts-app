# ╔══════════════════════════════════════════════════════════╗
# ║  CI Pipeline — Contacts App                             ║
# ║  Scan → Test → E2E → Build                              ║
# ╚══════════════════════════════════════════════════════════╝

trigger: none
pr: none

parameters:
  - name: imageVersion
    displayName: "Image Version Tag (e.g. 1.0.0)"
    type: string
    default: "1.0.0"

pool:
  vmImage: "ubuntu-latest"

variables:
  nodeVersion: "22.x"
  imageVersion: "${{ parameters.imageVersion }}"
  imageTag: "$(imageVersion)-$(Build.BuildId)"

stages:
  # ── Stage 1: Security & Lint Scans ─────────────────────
  - stage: Scan
    displayName: "Scan"
    jobs:
      - template: templates/scan.yml

  # ── Stage 2: Unit & Integration Tests ──────────────────
  - stage: Test
    displayName: "Test"
    dependsOn: Scan
    condition: always()
    jobs:
      - template: templates/test.yml
        parameters:
          nodeVersion: $(nodeVersion)

  # ── Stage 3: E2E Tests ────────────────────────────────
  - stage: E2E
    displayName: "E2E"
    dependsOn: Test
    condition: always()
    jobs:
      - template: templates/test-e2e.yml
        parameters:
          nodeVersion: $(nodeVersion)

  # ── Stage 4: Build & Package ───────────────────────────
  - stage: Build
    displayName: "Build"
    dependsOn: E2E
    condition: not(canceled())
    jobs:
      - template: templates/build-docker.yml
        parameters:
          imageTag: $(imageTag)
          imageVersion: $(imageVersion)
