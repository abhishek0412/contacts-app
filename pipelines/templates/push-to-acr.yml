# Template: Provision ACR, load Docker tar artifacts, and push to registry

parameters:
  - name: acrName
    type: string
  - name: azureSubscription
    type: string
  - name: imageTag
    type: string
  - name: imageVersion
    type: string
  - name: region
    type: string
    default: "eastus2"
  - name: envSuffix
    type: string
    default: "dev"

jobs:
  - job: Push
    displayName: "Push"
    steps:
      - task: AzureResourceManagerTemplateDeployment@3
        inputs:
          connectedServiceName: "${{ parameters.azureSubscription }}"
          deploymentScope: "Subscription"
          location: "${{ parameters.region }}"
          templateLocation: "Linked artifact"
          csmFile: "pipelines/infra/bootstrap.bicep"
          overrideParameters: "-location ${{ parameters.region }} -acrName ${{ parameters.acrName }} -environmentSuffix ${{ parameters.envSuffix }}"
          deploymentMode: "Incremental"
          deploymentName: "bootstrap-$(Build.BuildId)"
        displayName: "Provision RG & ACR"

      - task: DownloadPipelineArtifact@2
        inputs:
          source: "specific"
          project: "$(System.TeamProjectId)"
          pipeline: "$(resources.pipeline.ci.pipelineID)"
          runVersion: "specific"
          runId: "$(resources.pipeline.ci.runID)"
          artifact: "docker-images"
          path: "$(Pipeline.Workspace)/docker-images"
        displayName: "Download CI artifacts"

      - script: |
          docker load -i $(Pipeline.Workspace)/docker-images/contacts-app-api-${{ parameters.imageTag }}.tar
          docker load -i $(Pipeline.Workspace)/docker-images/contacts-app-frontend-${{ parameters.imageTag }}.tar
        displayName: "Load Docker images"

      - task: AzureCLI@2
        inputs:
          azureSubscription: "${{ parameters.azureSubscription }}"
          scriptType: "bash"
          scriptLocation: "inlineScript"
          inlineScript: |
            ACR="${{ parameters.acrName }}"
            IMAGE_TAG="${{ parameters.imageTag }}"
            IMAGE_VER="${{ parameters.imageVersion }}"

            az acr login --name "$ACR"

            for IMAGE in contacts-app-api contacts-app-frontend; do
              for TAG in "$IMAGE_TAG" "$IMAGE_VER" "latest"; do
                docker tag "$IMAGE:$IMAGE_TAG" "$ACR.azurecr.io/$IMAGE:$TAG"
                docker push "$ACR.azurecr.io/$IMAGE:$TAG"
              done
            done
        displayName: "Tag & push images"
