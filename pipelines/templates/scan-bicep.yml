# Template: Bicep linting + Checkov IaC security scan

jobs:
  - job: BicepLint
    displayName: "Bicep Lint"
    steps:
      - script: |
          az bicep install
          echo "=== Linting Bicep files ==="
          FAILED=0
          for file in $(find pipelines/infra -name '*.bicep'); do
            echo "--- Linting: $file ---"
            if ! az bicep build --file "$file" --stdout > /dev/null; then
              echo "##vso[task.logissue type=error]Lint failed: $file"
              FAILED=1
            fi
          done
          if [ $FAILED -eq 1 ]; then
            echo "##vso[task.logissue type=error]Bicep linting failed"
            exit 1
          fi
          echo "All Bicep files passed linting."
        displayName: "Bicep Lint (az bicep build)"

  - job: CheckovScan
    displayName: "Checkov IaC Security Scan"
    steps:
      - script: |
          pip install checkov --quiet
        displayName: "Install Checkov"

      - script: |
          checkov \
            --directory pipelines/infra \
            --framework bicep \
            --output cli \
            --output junitxml \
            --output-file-path .
        displayName: "Run Checkov scan"

      - task: PublishTestResults@2
        inputs:
          testResultsFormat: "JUnit"
          testResultsFiles: "results_junitxml.xml"
          testRunTitle: "Checkov IaC Scan"
          failTaskOnFailedTests: true
        condition: succeededOrFailed()
        displayName: "Publish Checkov results"
