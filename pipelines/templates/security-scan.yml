# Template: Secret scanning with Gitleaks

jobs:
  - job: Gitleaks
    displayName: "Gitleaks Secret Detection"
    steps:
      - script: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
        displayName: "Install Gitleaks"

      - script: |
          gitleaks detect --source=. --verbose --report-format=sarif --report-path=$(System.DefaultWorkingDirectory)/gitleaks-report.sarif
        displayName: "Run Gitleaks scan"

      - task: PublishBuildArtifacts@1
        inputs:
          PathtoPublish: "$(System.DefaultWorkingDirectory)/gitleaks-report.sarif"
          ArtifactName: "security-reports"
          publishLocation: "Container"
        condition: succeededOrFailed()
        displayName: "Publish Gitleaks report"
