# Template: Frontend unit tests

parameters:
  - name: nodeVersion
    type: string

jobs:
  - job: FrontendTests
    displayName: "Frontend Unit Tests"
    steps:
      - task: NodeTool@0
        inputs:
          versionSpec: "${{ parameters.nodeVersion }}"
        displayName: "Install Node.js"

      - script: |
          cd frontend
          npm ci
          npm install --no-save jest-junit
        displayName: "Install dependencies"

      - script: |
          cd frontend
          npm audit --audit-level=high
        displayName: "Audit frontend dependencies"
        continueOnError: true

      - script: |
          cd frontend
          npx react-scripts test --ci --watchAll=false --reporters=default --reporters=jest-junit
        displayName: "Run frontend tests"
        env:
          JEST_JUNIT_OUTPUT_DIR: "$(System.DefaultWorkingDirectory)/frontend/test-results"
          JEST_JUNIT_OUTPUT_NAME: "frontend-results.xml"
          CI: "true"

      - task: PublishTestResults@2
        inputs:
          testResultsFormat: "JUnit"
          testResultsFiles: "frontend/test-results/*.xml"
          testRunTitle: "Frontend Unit Tests"
        condition: succeededOrFailed()
        displayName: "Publish frontend test results"
