# Template: API integration tests

parameters:
  - name: nodeVersion
    type: string

jobs:
  - job: ServerTests
    displayName: "Server Integration Tests"
    steps:
      - task: NodeTool@0
        inputs:
          versionSpec: "${{ parameters.nodeVersion }}"
        displayName: "Install Node.js"

      - script: |
          cd server-api
          npm ci
          npm install --no-save jest-junit
        displayName: "Install dependencies"

      - script: |
          cd server-api
          npm audit --audit-level=high
        displayName: "Audit API dependencies"
        continueOnError: true

      - script: |
          cd server-api
          npx jest --verbose --ci --reporters=default --reporters=jest-junit
        displayName: "Run API tests"
        env:
          JEST_JUNIT_OUTPUT_DIR: "$(System.DefaultWorkingDirectory)/server-api/test-results"
          JEST_JUNIT_OUTPUT_NAME: "api-results.xml"

      - task: PublishTestResults@2
        inputs:
          testResultsFormat: "JUnit"
          testResultsFiles: "server-api/test-results/*.xml"
          testRunTitle: "API Integration Tests"
        condition: succeededOrFailed()
        displayName: "Publish API test results"
