# Template: Deploy to a specific region using Azure Container Apps

parameters:
  - name: environment
    type: string
  - name: azureSubscription
    type: string
  - name: resourceGroup
    type: string
  - name: region
    type: string
  - name: acrName
    type: string
  - name: imageTag
    type: string
  - name: envSuffix
    type: string
  - name: canaryPercentage
    type: number
    default: 100

jobs:
  - deployment: Deploy
    displayName: "Deploy to ${{ parameters.region }}"
    environment: "${{ parameters.environment }}"
    strategy:
      runOnce:
        deploy:
          steps:
            - task: AzureCLI@2
              inputs:
                azureSubscription: "${{ parameters.azureSubscription }}"
                scriptType: "bash"
                scriptLocation: "inlineScript"
                inlineScript: |
                  set -e

                  RG="${{ parameters.resourceGroup }}"
                  REGION="${{ parameters.region }}"
                  ACR="${{ parameters.acrName }}"
                  TAG="${{ parameters.imageTag }}"
                  SUFFIX="${{ parameters.envSuffix }}"
                  ENV_NAME="contacts-env-${SUFFIX}"
                  API_APP="contacts-api-${SUFFIX}"
                  FRONTEND_APP="contacts-frontend-${SUFFIX}"

                  echo "=== Deploying infrastructure (Bicep) ==="
                  az deployment group create \
                    --resource-group "$RG" \
                    --template-file pipelines/infra/main.bicep \
                    --parameters \
                      location="$REGION" \
                      environmentSuffix="$SUFFIX" \
                      acrName="$ACR" \
                      apiImageTag="$TAG" \
                      frontendImageTag="$TAG"

                  echo "=== Getting API internal FQDN ==="
                  API_FQDN=$(az containerapp show \
                    --name "$API_APP" \
                    --resource-group "$RG" \
                    --query "properties.configuration.ingress.fqdn" \
                    --output tsv)

                  echo "API internal FQDN: $API_FQDN"

                  echo "=== Updating frontend with API URL ==="
                  az containerapp update \
                    --name "$FRONTEND_APP" \
                    --resource-group "$RG" \
                    --set-env-vars "API_PROXY_PASS=https://${API_FQDN}/"

              displayName: "Deploy via Bicep & configure apps"

            # Canary: set traffic split if not 100%
            - ${{ if ne(parameters.canaryPercentage, 100) }}:
                - task: AzureCLI@2
                  inputs:
                    azureSubscription: "${{ parameters.azureSubscription }}"
                    scriptType: "bash"
                    scriptLocation: "inlineScript"
                    inlineScript: |
                      SUFFIX="${{ parameters.envSuffix }}"
                      RG="${{ parameters.resourceGroup }}"

                      echo "=== Setting canary traffic: ${{ parameters.canaryPercentage }}% to latest ==="
                      az containerapp ingress traffic set \
                        --name "contacts-frontend-${SUFFIX}" \
                        --resource-group "$RG" \
                        --revision-weight latest=${{ parameters.canaryPercentage }}
                  displayName: "Set canary traffic (${{ parameters.canaryPercentage }}%)"

            - task: AzureCLI@2
              inputs:
                azureSubscription: "${{ parameters.azureSubscription }}"
                scriptType: "bash"
                scriptLocation: "inlineScript"
                inlineScript: |
                  SUFFIX="${{ parameters.envSuffix }}"
                  RG="${{ parameters.resourceGroup }}"

                  echo "=== Smoke test — Frontend ==="
                  FRONTEND_URL=$(az containerapp show \
                    --name "contacts-frontend-${SUFFIX}" \
                    --resource-group "$RG" \
                    --query "properties.configuration.ingress.fqdn" \
                    --output tsv)

                  HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${FRONTEND_URL}/")
                  echo "Frontend responded with: $HTTP_STATUS"
                  if [ "$HTTP_STATUS" -ne 200 ]; then
                    echo "##vso[task.logissue type=error]Smoke test failed — frontend returned $HTTP_STATUS"
                    exit 1
                  fi

                  echo "=== Smoke test — API (via frontend proxy) ==="
                  API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${FRONTEND_URL}/api/contacts")
                  echo "API responded with: $API_STATUS"
                  if [ "$API_STATUS" -ne 200 ]; then
                    echo "##vso[task.logissue type=error]Smoke test failed — API returned $API_STATUS"
                    exit 1
                  fi

                  echo "Smoke tests passed!"
              displayName: "Run smoke tests"
