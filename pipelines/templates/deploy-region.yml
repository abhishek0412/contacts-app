# Template: Deploy to a specific region using Azure Container Apps
# Uses subscription-level Bicep — creates RG + all resources via IaC

parameters:
  - name: environment
    type: string
  - name: azureSubscription
    type: string
  - name: region
    type: string
  - name: acrName
    type: string
  - name: imageTag
    type: string
  - name: envSuffix
    type: string
  - name: canaryPercentage
    type: number
    default: 100

jobs:
  - deployment: Deploy
    displayName: "Deploy to ${{ parameters.region }}"
    environment: "${{ parameters.environment }}"
    strategy:
      runOnce:
        deploy:
          steps:
            - checkout: self

            - task: AzureResourceManagerTemplateDeployment@3
              name: deployBicep
              inputs:
                connectedServiceName: "${{ parameters.azureSubscription }}"
                deploymentScope: "Subscription"
                location: "${{ parameters.region }}"
                templateLocation: "Linked artifact"
                csmFile: "pipelines/infra/main.bicep"
                overrideParameters: >-
                  -location ${{ parameters.region }}
                  -environmentSuffix ${{ parameters.envSuffix }}
                  -acrName ${{ parameters.acrName }}
                  -apiImageTag ${{ parameters.imageTag }}
                  -frontendImageTag ${{ parameters.imageTag }}
                deploymentMode: "Incremental"
                deploymentName: "deploy-${{ parameters.envSuffix }}-$(Build.BuildId)"
                deploymentOutputs: "armOutputs"
              displayName: "Deploy via Bicep (subscription-level)"

            - pwsh: |
                $outputs = '$(armOutputs)' | ConvertFrom-Json
                $fqdn = $outputs.frontendFqdn.value
                Write-Host "Frontend FQDN: $fqdn"
                Write-Host "##vso[task.setvariable variable=frontendFqdn]$fqdn"
              displayName: "Parse Bicep deployment outputs"

            # Canary: set traffic split if not 100%
            - ${{ if ne(parameters.canaryPercentage, 100) }}:
                - task: AzureCLI@2
                  inputs:
                    azureSubscription: "${{ parameters.azureSubscription }}"
                    scriptType: "bash"
                    scriptLocation: "inlineScript"
                    inlineScript: |
                      SUFFIX="${{ parameters.envSuffix }}"
                      RG="rg-contacts-${SUFFIX}"

                      echo "=== Setting canary traffic: ${{ parameters.canaryPercentage }}% to latest ==="
                      az containerapp ingress traffic set \
                        --name "contacts-frontend-${SUFFIX}" \
                        --resource-group "$RG" \
                        --revision-weight latest=${{ parameters.canaryPercentage }}
                  displayName: "Set canary traffic (${{ parameters.canaryPercentage }}%)"

            - task: AzureCLI@2
              inputs:
                azureSubscription: "${{ parameters.azureSubscription }}"
                scriptType: "bash"
                scriptLocation: "inlineScript"
                inlineScript: |
                  FRONTEND_URL="$(frontendFqdn)"

                  echo "=== Waiting for apps to stabilize ==="
                  sleep 30

                  echo "=== Smoke test — Frontend ==="
                  HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --retry 5 --retry-delay 10 --retry-all-errors --max-time 30 "https://${FRONTEND_URL}/")
                  echo "Frontend responded with: $HTTP_STATUS"
                  if [ "$HTTP_STATUS" -ne 200 ]; then
                    echo "##vso[task.logissue type=error]Smoke test failed — frontend returned $HTTP_STATUS"
                    exit 1
                  fi

                  echo "=== Smoke test — API (via frontend proxy) ==="
                  API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --retry 5 --retry-delay 10 --retry-all-errors --max-time 30 "https://${FRONTEND_URL}/api/contacts")
                  echo "API responded with: $API_STATUS"
                  if [ "$API_STATUS" -ne 200 ]; then
                    echo "##vso[task.logissue type=error]Smoke test failed — API returned $API_STATUS"
                    exit 1
                  fi

                  echo "Smoke tests passed!"
              displayName: "Run smoke tests"
